services:
  palworld:
    build: .
    container_name: palworld-server
    restart: unless-stopped
    ports:
      - "8211:8211/udp"
      - "27015:27015/udp"
    volumes:
      # Persist the ENTIRE server install (3.8 GB game files + saves + config)
      # This avoids re-downloading via SteamCMD on every restart
      - palworld-server:/home/steam/palserver
    env_file:
      # Loads every var from this file into the container env.
      # On Coolify: vars set in the resource's "Environment Variables" tab
      # are written to .env in the project root before deploy — so just set
      # PAL_* there and they reach the entrypoint with no compose edits.
      # Locally: create .env next to this file with KEY=VALUE per line.
      - path: .env
        required: false
    environment:
      # Hardcoded defaults — `environment:` wins over `env_file:`, so to change
      # these, edit here directly (don't try to override via Coolify UI).
      COMMUNITY_SERVER: "true"
      MULTITHREAD: "true"

volumes:
  palworld-server:
